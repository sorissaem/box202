<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzTBjL9zIt80Bvakmr-J3yuIhXaUyBiu0oIYM0aCzpFJE9zAVXRpDr-aUSyZhpAy7iNgQ/exec";

  let userPw = "";

  function checkPassword() {
    const pw = document.getElementById('classPw').value;
    if (pw === "우리반1234") { // 간단한 확인 (보안을 위해 실제로는 서버 통신 권장)
      userPw = pw;
      document.getElementById('passwordArea').style.display = 'none';
      document.getElementById('suggestionForm').style.display = 'block';
    } else {
      alert('암호가 틀렸습니다!');
    }
  }

  async function submitData() {
    const data = {
      password: userPw,
      name: document.getElementById('userName').value,
      category: document.getElementById('category').value,
      content: document.getElementById('content').value
    };

    if(!data.name || !data.content) {
      alert('모두 입력해주세요!'); return;
    }

    document.getElementById('submitBtn').disabled = true;
    document.getElementById('loading').style.display = 'block';

    try {
      // 깃허브에서 구글로 데이터를 보내는 핵심 코드
      const response = await fetch(WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify(data)
      });
      const result = await response.json();
      
      alert(result.message);
      if(result.success) {
        document.getElementById('userName').value = '';
        document.getElementById('content').value = '';
      }
    } catch (e) {
      alert("전송 실패: 구글 배포 설정을 확인하세요.");
    } finally {
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('loading').style.display = 'none';
    }
  }
</script>
